<div id="shader-div"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>

<script>
VANTA.FOG({
  el: "#shader-div",
  mouseControls: false,
  touchControls: false,
  gyroControls: false,

  minHeight: 200,
  minWidth: 200,

  highlightColor: 0x10183e,
  midtoneColor: 0x000000,
  lowlightColor: 0x000000,
  baseColor: 0x000000,

  blurFactor: 1.0,
speed: 1.5,
zoom: 1.0
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showcase</title>
    <link rel="stylesheet" href="styles/showcase.css">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/SplitText.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/DrawSVGPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/Draggable.min.js"></script>
    <script src=https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/InertiaPlugin.min.js></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/MorphSVGPlugin.min.js"></script>

</head>
<body>

    <header>

        <img src="images/pfp.jpg" alt="pfp" id="message-picture">

        <div id="message-box">

            <section class="message-container" id="message-1">

                <svg class="message-tail" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 27.09 18.68">
                    <defs><style>
                        .cls-1{fill:#4952ed;}
                    </style></defs>
                    <path class="cls-1" d="M0,18.68S10.62,15.52,10.62,0h16.47S21.85,18.68,0,18.68Z"/>
                </svg>

                <div class="message-bubble">
                    Hi, I'm Santiago
                </div>

            </section>

            <section class="message-container" id="message-2">

                <svg class="message-tail" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 27.09 18.68">
                    <defs><style>
                        .cls-1{fill:#4952ed;}
                    </style></defs>
                    <path class="cls-1" d="M0,18.68S10.62,15.52,10.62,0h16.47S21.85,18.68,0,18.68Z"/>
                </svg>

                <div class="message-bubble">
                    I create purposeful solutions <br> that deliver measurable results.
                </div>

                <div class="message-status">Delivered</div>

            </section>

        </div>

    </header>

    <div id="phone-container">
        <p>
            A well-designed UI can increase
            <br>
            conversion rates up to 200%
            <br>
            <br>
            A good UX overall may boost
            <br>
            conversion rates up to 400%
            <br>
            <br>
            <br>
            <a href="https://baymard.com/learn/ux-statistics">https://baymard.com/learn/ux-statistics</a>
        </p>
        <img src="images/phone-lowres.png" alt="phone" id="phone">
    </div>
    
    <main>
        helloo
    </main>

    
    <script src="scripts/showcase.js"></script>
</body>
</html>
